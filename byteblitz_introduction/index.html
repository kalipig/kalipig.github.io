<h2>码卡：一款充满 OI 元素的卡牌游戏</h2>
<p><strong>码卡</strong> 是一款富含 <strong>OI</strong>（信息学奥赛）元素的卡牌游戏，由两位中学生开发。这个项目正在积极开发中。</p>
<p><strong>想了解我们的进度？</strong></p>
<p>下载 <a href="https://raw.githubusercontent.com/JeremyHe1209/ByteBlitz/main/game.tldr" target="_blank">game.tldr</a> 并使用 <a href="https://www.tldraw.com" target="_blank">tldraw</a> 打开。这个文件详细展示了每个类的具体成员、类之间的关系以及我们目前的完成情况。</p>
<p><strong>想加入我们？</strong></p>

<p><strong>开源项目</strong></p>
<p>这个项目是完全开源的。任何人都可以在协议允许的范围内使用我们的代码。</p>
